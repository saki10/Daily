{% extends "reports/base.html" %}
{% block content %}
<h1>Slack設定</h1>

<form method="post">
  {% csrf_token %}

  <label for="slack_webhook_url">Webhook URL</label><br>
  <input
    type="url"
    name="slack_webhook_url"
    id="slack_webhook_url"
    style="width: 520px;"
    value=""
    placeholder="Slack Webhook URLを入力してください"
  />

  {% if integration.slack_webhook_url %}
    <p style="margin-top:8px; color:#666;">
      現在Webhookは設定済みです。変更する場合のみ入力してください。
    </p>
  {% endif %}

  <br><br>
  <button type="submit">保存</button>
</form>

<p style="margin-top:16px;">
  Slack App の Incoming Webhooks を有効化して、Webhook URL を発行してください。
</p>
{% endblock %}
