<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>パスワード変更</title>
</head>
<body>

<h1>パスワード変更</h1>

{% if messages %}
    {% for message in messages %}
        <p style="color:green;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">変更する</button>
</form>

<br>
<a href="{% url 'settings' %}">設定に戻る</a>

</body>
</html>
