<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>メールアドレス変更</title>
</head>
<body>

<h1>メールアドレス変更</h1>

<!-- メッセージ表示（エラーや成功通知） -->
{% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="post">
    {% csrf_token %}

    <label>新しいメールアドレス：</label><br>
    <input type="email" name="email" required>
    <br><br>

    <label>確認入力：</label><br>
    <input type="email" name="email_confirm" required>
    <br><br>

    <button type="submit">更新</button>
</form>

<br>
<a href="{% url 'settings' %}">設定に戻る</a>

</body>
</html>
