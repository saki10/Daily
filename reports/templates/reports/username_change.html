{% extends "reports/base.html" %}
{% load static %}

{% block content %}
<div class="settings-layout">
  <div class="settings-page">
    <div class="settings-card username-card">
      <h1 class="settings-title">ユーザー名変更</h1>
      <p class="settings-subtitle">
        新しいユーザー名を入力してください。
      </p>

      <form method="post" class="settings-form">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username" class="form-label">新しいユーザー名</label>
          <input
            type="text"
            name="username"
            id="id_username"
            class="form-input"
            value="{{ request.user.username }}"
            placeholder="新しいユーザー名を入力"
          />
        </div>

        <div class="form-actions">
          <button type="submit" class="primary-btn">変更する</button>
          <a href="{% url 'settings' %}" class="back-link">戻る</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
